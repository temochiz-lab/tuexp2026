<!doctype html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<script src="https://unpkg.com/jspsych@7.3.4"></script>
		<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
		<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
		<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
		<link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
		<style>body { overflow: hidden; }</style>
	</head>
	<body tabindex="0">
	</body>
	<script>
        /**
         * 逆ストループもできる。パスワード保護必須
         *
         * by Daiichiro Kuroki
         *
         * MIT License | https://github.com/kohske/KisojiOnline/blob/master/LICENSE
         */

        // jsPsych 7: まず initJsPsych() でインスタンスを生成する
        const jsPsych = initJsPsych({
            override_safe_mode: true,
            on_finish: function() {
                jsPsych.data.get().ignore('stimulus').localSave('csv', myrandID + '-' + task + '.csv');
            }
        });

        // URLからタスクの情報を読み取る
        // reverse_stroop.html?task=2 のようにURLで指定する
        // 1 = カラフルな色名に対して黒字の色名で回答（ストループ）
        // 2 = 色パッチに対して黒字の色名で回答（ストループの統制条件）
        // 3 = カラフルな色名に対して色パッチで回答（逆ストループ）
        // 4 = 黒字の色名に対して色パッチで回答（逆ストループの統制条件）

        // jsPsych 7: getURLVariable() は null を返す（undefined ではない）
        let task = jsPsych.data.getURLVariable('task');
        if (task === null) task = 1;
        else task = Number(task);

        let timeLimit = jsPsych.data.getURLVariable('timeLimit');
        let nTrials = jsPsych.data.getURLVariable('nTrials');
        if (timeLimit === null) {
            timeLimit = undefined;
            if (nTrials === null) {
                nTrials = 50; // 制限時間も回数も指定がないときは、ここで指定した回数に。
            } else {
                nTrials = Number(nTrials);
            }
        } else {
            timeLimit = Number(timeLimit);
            nTrials = timeLimit * 2; // 制限時間の2倍は回答できないだろうという予測
        }

        const nPractice = 10; // 練習試行の回数。練習のときは制限時間はありません。

        // 黄色の色としてyellowを設定すると見えにくいので数値で指定しています
        const yellowData = '#ffd900';

        // 回答の選択肢
        // このプログラムでは、赤=1, 青=2, 黄=3, 緑=4, 黒=5　と対応づけしています
        const selectCol = [
            {str: 'あか', col: 'red', id: 1},
            {str: 'あお', col: 'blue', id: 2},
            {str: 'きいろ', col: yellowData, id: 3},
            {str: 'みどり', col: 'green', id: 4},
            {str: 'くろ', col: 'black', id: 5}
        ];

        const patchWidth = 100;
        const patchHeight = 50;
        const patchBlank = 20;
        const fontSize1 = 30;
        let startTime = 0;

        // jsPsych 7: initJsPsych() の後で randomization を使用可能
        const myrandID = jsPsych.randomization.randomID(8);

        let experiment = [];

        // 年齢の選択肢
        let option_string = '<option value="">年齢を選択してください</option>';
        for (let i = 10; i <= 80; i++) {
            option_string += '<option value="' + i + '">' + i + '歳</option>';
        }

        const form_trial = {
            type: jsPsychSurveyHtmlForm, // jsPsych 7: 'survey-html-form' → jsPsychSurveyHtmlForm
            preamble: '<h2>実験を始めます。<br>性別と年齢を回答して「次へ」をクリックしてください。</h2>',
            html: '<input type="radio" name="gender" value="1" required>男性'
                + '<input type="radio" name="gender" value="2">女性'
                + '<input type="radio" name="gender" value="3">その他・無回答'
                + '<div> </div>'
                + '<select class="age" required name="age">'
                + option_string + '</select>'
                + '<div> </div>',
            button_label: '次へ',
            on_finish: function(data) {
                // jsPsych 7: data.response はすでにオブジェクト（JSON.parse 不要）
                jsPsych.data.addProperties(data.response);
                jsPsych.data.addProperties({
                    date: getDateStr(),
                    randomID: myrandID,
                    task: task
                });
            }
        };
        experiment.push(form_trial);

        const messages = [
            `<p>この課題では、言葉とインクの色の組み合わせがちぐはぐですが、言葉に惑わされないようにして、インクの色を選択してください。<br>「色の名前」をクリックして回答します。</p>`,
            `<p>この課題では、インクの色にあたる言葉を選択してください。<br>「色の名前」をクリックして回答します。</p>`,
            `<p>この課題では、言葉とインクの色の組み合わせがちぐはぐですが、インクの色に惑わされないようにして、言葉が意味する色を選択してください。<br>「色のついた四角形」をクリックして回答します。</p>`,
            `<p>この課題では、言葉が意味するインクの色を選択してください。<br>「色のついた四角形」をクリックして回答します。</p>`
        ];

        const instruction = `${messages[task - 1]} <p>まずは練習試行を始めます。</p>
            <p>練習試行ではあなたの回答が正しかったかどうかについてのフィードバックがあります。<br>
            練習試行は${nPractice}試行です。</p>`;

        const instruction1 = {
            type: jsPsychHtmlButtonResponse, // jsPsych 7: 'html-button-response' → jsPsychHtmlButtonResponse
            choices: ['次へ'],
            stimulus: instruction,
        };
        experiment.push(instruction1);

        // 実験刺激の準備
        let stimulus_set = [];
        if (task == 4) {
            // 逆ストループの統制条件。黒字の色名
            stimulus_set = [
                {str: 'あか', strID: 1, col: 'black', colID: 5},
                {str: 'あお', strID: 2, col: 'black', colID: 5},
                {str: 'きいろ', strID: 3, col: 'black', colID: 5},
                {str: 'みどり', strID: 4, col: 'black', colID: 5},
                {str: 'くろ', strID: 5, col: 'black', colID: 5},
            ];
        } else if (task == 3 || task == 1) {
            // ストループ、逆ストループ。カラフルな文字。文字と色が一致しないこと
            stimulus_set = [
                {str: 'あか', strID: 1, col: 'blue', colID: 2},
                {str: 'あか', strID: 1, col: yellowData, colID: 3},
                {str: 'あか', strID: 1, col: 'green', colID: 4},
                {str: 'あか', strID: 1, col: 'black', colID: 5},
                {str: 'あお', strID: 2, col: 'red', colID: 1},
                {str: 'あお', strID: 2, col: yellowData, colID: 3},
                {str: 'あお', strID: 2, col: 'green', colID: 4},
                {str: 'あお', strID: 2, col: 'black', colID: 5},
                {str: 'きいろ', strID: 3, col: 'red', colID: 1},
                {str: 'きいろ', strID: 3, col: 'blue', colID: 2},
                {str: 'きいろ', strID: 3, col: 'green', colID: 4},
                {str: 'きいろ', strID: 3, col: 'black', colID: 5},
                {str: 'みどり', strID: 4, col: 'red', colID: 1},
                {str: 'みどり', strID: 4, col: 'blue', colID: 2},
                {str: 'みどり', strID: 4, col: yellowData, colID: 3},
                {str: 'みどり', strID: 4, col: 'black', colID: 5},
                {str: 'くろ', strID: 5, col: 'red', colID: 1},
                {str: 'くろ', strID: 5, col: 'blue', colID: 2},
                {str: 'くろ', strID: 5, col: yellowData, colID: 3},
                {str: 'くろ', strID: 5, col: 'green', colID: 4}
            ];
        } else {
            // ストループの統制条件。色パッチ。文字情報は使わないが互換性のため
            stimulus_set = [
                {str: 'あか', strID: 1, col: 'red', colID: 1},
                {str: 'あお', strID: 2, col: 'blue', colID: 2},
                {str: 'きいろ', strID: 3, col: yellowData, colID: 3},
                {str: 'みどり', strID: 4, col: 'green', colID: 4},
                {str: 'くろ', strID: 5, col: 'black', colID: 5},
            ];
        }

        for (let k = 0; k < 2; k++) { // k = 0 は練習試行。 k = 1 は本試行
            const all_stimuli = [];
            // jsPsych 7: repeat() の第3引数（unpack）は廃止。常にオブジェクトの配列を返す。
            const tmp_shuffled = jsPsych.randomization.repeat(stimulus_set, 1);

            let nMax = 0;
            if (k == 0) { // 練習試行
                nMax = nPractice;
            } else { // 本試行
                const startMsg = {
                    type: jsPsychHtmlButtonResponse,
                    choices: ['次へ'],
                    stimulus: function() {
                        if (typeof timeLimit === "undefined") {
                            return `<p>今から本試行を始めます。本試行ではフィードバックはありません。</p>
                            <p>全部で${nTrials}試行です。できるだけ速く正確に回答してください。</p>`;
                        } else {
                            return `<p>今から本試行を始めます。本試行ではフィードバックはありません。</p>
                            <p>制限時間は${timeLimit}秒です。できるだけ速く正確に回答してください。</p>`;
                        }
                    },
                    on_finish: function(data) {
                        startTime = data.time_elapsed;
                    }
                };
                experiment.push(startMsg);
                nMax = nTrials;
            }

            for (let i = 0; i < nMax; i++) {
                all_stimuli.push(tmp_shuffled[i % stimulus_set.length]);
            }

            // jsPsych 7: repeat() は常にオブジェクトの配列を返す
            const shuffled_stimuli = jsPsych.randomization.repeat(all_stimuli, 1);

            for (let i = 0; i < shuffled_stimuli.length; i++) { // .str.length → .length
                // jsPsych 7: shuffledCol もオブジェクトの配列
                const shuffledCol = jsPsych.randomization.repeat(selectCol, 1);

                let colScale = '';
                if (task == 4 || task == 3) {
                    colScale = makeColScale(shuffledCol, 2); // 色パッチの選択肢を作成
                } else {
                    colScale = makeColScale(shuffledCol, 1); // 色名（文字）の選択肢を作成
                }

                let stim_html = '';
                if (task == 4 || task == 3 || task == 1) { // 刺激が文字
                    // jsPsych 7: shuffled_stimuli[i].col のようにアクセス（unpack廃止のため）
                    stim_html = '<p style="color: ' + shuffled_stimuli[i].col + '; text-align: center; font-size:' + fontSize1 + 'px;">' + shuffled_stimuli[i].str + '</p>';
                } else {
                    stim_html = '<div style="display: block; margin: auto; background-color: ' + shuffled_stimuli[i].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>';
                }

                const trial = {
                    type: jsPsychSurveyLikert, // jsPsych 7: 'survey-likert' → jsPsychSurveyLikert
                    post_trial_gap: 0,
                    button_label: '次へ',
                    questions: [{prompt: stim_html, labels: colScale, required: true}],
                    data: {
                        honshiko: k,
                        strID: shuffled_stimuli[i].strID,
                        colID: shuffled_stimuli[i].colID,
                        // jsPsych 7: unpack廃止のため map() でIDの配列を作成
                        choice: shuffledCol.map(function(c) { return c.id; })
                    },
                    on_finish: function(data) {
                        // jsPsych 7: data.response はオブジェクト（JSON.parse不要）
                        const response = data.response;

                        let correctID = 0;
                        if (task == 4 || task == 3) {
                            correctID = data.strID;
                        } else {
                            correctID = data.colID;
                        }

                        const seikai = (data.choice[response.Q0] === correctID) ? 1 : 0;

                        // jsPsych 7: on_finish内でdataオブジェクトに直接代入して追加データを記録
                        data.Q0 = response.Q0;
                        data.kaito = data.choice[response.Q0];
                        data.seikai = seikai;

                        if (data.honshiko === 0) return; // 練習のときは以下をやらない

                        const time2 = data.time_elapsed - startTime; // 経過時間
                        console.log(time2);

                        if (typeof timeLimit === "undefined") return; // 試行数で管理しているとき
                        if (time2 <= timeLimit * 1000) return; // 制限時間内のときは以下をやらない

                        const nTotal = jsPsych.data.get().filter({trial_type: 'survey-likert', honshiko: 1}).count();
                        const nCorrect = jsPsych.data.get().filter({trial_type: 'survey-likert', honshiko: 1, seikai: 1}).count();

                        jsPsych.data.addProperties({
                            timeLimit: timeLimit,
                            total: nTotal,
                            correct: nCorrect,
                            incorrect: nTotal - nCorrect
                        });
                        // jsPsych 7: endExperiment() → abortExperiment()
                        jsPsych.abortExperiment('<p class="center-content">回答時間を過ぎました。実験の結果が自動的にダウンロードされたか、ダウンロードの画面が表示されます。</p>');
                    }
                };
                experiment.push(trial);

                const feedBack = {
                    type: jsPsychHtmlButtonResponse,
                    choices: ['次へ'],
                    post_trial_gap: 0,
                    stimulus: function() {
                        return `<p class="center-content">${getCorrectness()}</p>`;
                    },
                };

                if (k == 0) { // 練習試行
                    experiment.push(feedBack);
                }
            }
        }

        const endMsg = { // このブロックは全試行に回答したときにのみ呼ばれます
            type: jsPsychHtmlButtonResponse,
            choices: ['次へ'],
            stimulus: '<p class="center-content">すべての試行に回答しました。「次へ」をクリックすると、実験の結果が自動的にダウンロードされるか、ダウンロードの画面が表示されます。</p>',
        };
        experiment.push(endMsg);

        // jsPsych 7: jsPsych.init({ timeline: experiment }) → jsPsych.run(experiment)
        document.body.focus();
        jsPsych.run(experiment);

        function getDateStr() {
            const d = new Date();
            const month = d.getMonth() + 1;
            return d.getFullYear() + '-' + month + '-' + d.getDate() + '-' + d.getHours() + ':' + d.getMinutes() + ':' + d.getSeconds();
        }

        function getCorrectness() {
            const data = jsPsych.data.getLastTrialData();
            if (data.values()[0].seikai == 1) {
                return '正しい回答です。';
            } else {
                return '誤った回答です。';
            }
        }

        function makeColScale(colData, type) { // typeが1のときは文字の選択肢、typeが2のときは色パッチの選択肢
            // jsPsych 7: colData はオブジェクトの配列（unpack廃止）
            // colData.str[0] → colData[0].str のようにアクセス
            if (type == 1) {
                const tmp_str = '<div style="display: block; margin: 20px ' + patchBlank + 'px; ';
                return [
                    tmp_str + 'width: ' + patchWidth + 'px; height: ' + patchHeight + 'px; font-size:' + fontSize1 + 'px;">' + colData[0].str + '</div>',
                    tmp_str + 'width: ' + patchWidth + 'px; height: ' + patchHeight + 'px; font-size:' + fontSize1 + 'px;">' + colData[1].str + '</div>',
                    tmp_str + 'width: ' + patchWidth + 'px; height: ' + patchHeight + 'px; font-size:' + fontSize1 + 'px;">' + colData[2].str + '</div>',
                    tmp_str + 'width: ' + patchWidth + 'px; height: ' + patchHeight + 'px; font-size:' + fontSize1 + 'px;">' + colData[3].str + '</div>',
                    tmp_str + 'width: ' + patchWidth + 'px; height: ' + patchHeight + 'px; font-size:' + fontSize1 + 'px;">' + colData[4].str + '</div>',
                ];
            } else {
                const tmp_str = '<div style="display: block; margin: auto ' + patchBlank + 'px; background-color: ';
                return [
                    tmp_str + colData[0].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>',
                    tmp_str + colData[1].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>',
                    tmp_str + colData[2].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>',
                    tmp_str + colData[3].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>',
                    tmp_str + colData[4].col + '; width: ' + patchWidth + 'px; height: ' + patchHeight + 'px;"></div>',
                ];
            }
        }
	</script>
</html>
